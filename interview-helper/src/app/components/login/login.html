<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="loginGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
          </linearGradient>
        </defs>
        <rect width="56" height="56" rx="14" fill="url(#loginGrad)"/>
        <path d="M16 14h24a2 2 0 012 2v24a2 2 0 01-2 2H16a2 2 0 01-2-2V16a2 2 0 012-2z" fill="none" stroke="#fff" stroke-width="1.5"/>
        <path d="M20 24h16M20 29h11M20 34h14" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="40" cy="40" r="8" fill="#22c55e"/>
        <path d="M36.5 40l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1>Interview Helper</h1>
    <p class="login-subtitle">Sign in to manage interviews</p>

    <!-- Error -->
    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <!-- Form -->
    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/></svg>
          <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="Enter username" autocomplete="username" autofocus />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Enter password" autocomplete="current-password" />
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="login-footer">
      <span>&copy; 2026 Created by <strong>Amaan Khan</strong></span>
    </div>
  </div>
</div>
