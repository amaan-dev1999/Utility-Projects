<div class="container">
  <h1>PDF Tool Demo</h1>
  <p class="subtitle">
    Select a sample PDF, download it, or preview it here. This app is used for PDF testing in our Playwright POC.
  </p>

  <div class="controls">
    <div class="control-group">
      <label for="pdfSelect">Select PDF document</label>
      <select
        id="pdfSelect"
        [value]="selectedPdf.id"
        (change)="onPdfChange($any($event.target).value)"
      >
        @for (pdf of pdfDocuments; track pdf.id) {
          <option [value]="pdf.id">
            {{ pdf.name }}
          </option>
        }
      </select>
    </div>

    <div class="control-group">
      <label>&nbsp;</label>
      <button type="button" (click)="downloadSelectedPdf()">
        Download PDF
      </button>
    </div>
  </div>

  <div class="preview">
    <div class="preview-header">
      <div class="preview-title">
        <div class="preview-title-icon">PDF</div>
        <div>
          <div class="preview-title-text">
            {{ selectedPdf.name }}
          </div>
          <div class="preview-subtitle">
            Preview from /{{ selectedPdf.path }}
          </div>
        </div>
      </div>
    </div>

    @if (selectedPdfUrl) {
      <iframe
        [src]="selectedPdfUrl | safeUrl"
        title="PDF Preview"
      ></iframe>
    } @else {
      <p>No PDF selected.</p>
    }
  </div>
</div>
